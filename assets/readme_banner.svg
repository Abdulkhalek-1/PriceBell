<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dotGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#313244" />
    </pattern>
    <filter id="heroGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="400" fill="#1e1e2e" />
  <rect width="1280" height="360" fill="url(#dotGrid)" />

  <g transform="translate(550, 45) scale(1.8)" filter="url(#heroGlow)">
    <path d="M 50 15 A 8 8 0 0 0 42 23 C 25 28 15 50 15 70 L 10 90 L 90 90 L 85 70 C 85 50 75 28 58 23 A 8 8 0 0 0 50 15 Z" 
          fill="none" stroke="#cba6f7" stroke-width="6" stroke-linejoin="round" />
    <path d="M 40 92 A 10 10 0 0 0 60 92 Z" 
          fill="none" stroke="#cba6f7" stroke-width="6" />
  </g>

  <text x="640" y="285" fill="#cba6f7" font-family="Inter, Nunito, system-ui, sans-serif" font-size="72" font-weight="bold" text-anchor="middle">PriceBell</text>
  <text x="640" y="330" fill="#cdd6f4" font-family="Inter, Nunito, system-ui, sans-serif" font-size="24" text-anchor="middle">Open-source desktop price tracker for Steam · Udemy · Amazon</text>

  <rect x="0" y="360" width="1280" height="40" fill="#313244" />
  <text x="640" y="386" fill="#cdd6f4" font-family="Inter, Nunito, system-ui, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="2">C++17 · Qt5 · SQLite</text>
</svg>
