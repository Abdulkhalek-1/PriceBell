name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.0)'
        required: true

permissions:
  contents: write

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  linux-appimage:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            qtbase5-dev qttools5-dev qttools5-dev-tools \
            libqt5svg5-dev libqt5sql5-sqlite \
            qtmultimedia5-dev \
            libfuse2 file librsvg2-bin

      - name: Configure and build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Build DEB and RPM packages
        run: |
          sudo apt-get install -y rpm
          cd build
          cpack -G DEB
          cpack -G RPM
          cd ..
          find build -name "*.deb" -exec mv {} PriceBell-${{ env.VERSION }}-linux-amd64.deb \;
          find build -name "*.rpm" -exec mv {} PriceBell-${{ env.VERSION }}-linux-x86_64.rpm \;

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin/i18n AppDir/usr/bin/plugins
          cp build/PriceBell AppDir/usr/bin/
          cp build/i18n/*.qm AppDir/usr/bin/i18n/ 2>/dev/null || true
          rsvg-convert -w 256 -h 256 assets/logo.svg -o pricebell.png

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Build AppImage
        run: |
          export QMAKE=$(which qmake)
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/PriceBell \
            --plugin qt \
            --output appimage \
            --desktop-file PriceBell.desktop \
            --icon-file pricebell.png
          mv PriceBell-*.AppImage PriceBell-${{ env.VERSION }}-linux-x86_64.AppImage

      - name: GPG sign AppImage
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --detach-sign --armor PriceBell-${{ env.VERSION }}-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            PriceBell-${{ env.VERSION }}-linux-x86_64.AppImage
            PriceBell-${{ env.VERSION }}-linux-x86_64.AppImage.asc
            PriceBell-${{ env.VERSION }}-linux-amd64.deb
            PriceBell-${{ env.VERSION }}-linux-x86_64.rpm

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            qt_arch: win64_msvc2019_64
            msvc_arch: x64
          - arch: x86
            qt_arch: win32_msvc2019
            msvc_arch: x86

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: ${{ matrix.qt_arch }}

      - name: Install OpenSSL 1.1
        run: choco install openssl --version=1.1.1.2100 -y --no-progress

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Configure and build
        run: |
          cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ env.VERSION }}"
          $arch = "${{ matrix.arch }}"
          $dir = "PriceBell-${tag}-windows-${arch}"

          New-Item -ItemType Directory -Path $dir
          Copy-Item build/PriceBell.exe $dir/
          Copy-Item -Recurse build/assets $dir/assets -ErrorAction SilentlyContinue
          Copy-Item -Recurse build/i18n $dir/i18n -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "$dir/plugins" -Force
          Copy-Item LICENSE, README.md $dir/

          windeployqt --release --no-translations --no-opengl-sw "$dir/PriceBell.exe"

          $sslBin = "C:\Program Files\OpenSSL\bin"
          if (Test-Path "$sslBin\libssl-1_1*.dll") {
              Copy-Item "$sslBin\libssl-1_1*.dll" "$dir/"
              Copy-Item "$sslBin\libcrypto-1_1*.dll" "$dir/"
              Write-Host "Copied OpenSSL 1.1 DLLs from $sslBin"
          } else {
              Write-Warning "OpenSSL 1.1 DLLs not found — HTTPS will not work"
          }

          Compress-Archive -Path $dir -DestinationPath "PriceBell-${tag}-windows-${arch}.zip"

      - name: Build NSIS installer
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $version = "${{ env.VERSION }}".TrimStart('v')
          $arch = "${{ matrix.arch }}"
          $stagingDir = "$env:GITHUB_WORKSPACE\PriceBell-${{ env.VERSION }}-windows-$arch"
          $nsisExe = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $nsisExe /DVERSION=$version /DSTAGEDIR=$stagingDir packaging\windows\installer.nsi
          $setupFile = "PriceBell-$version-windows-setup.exe"
          if (Test-Path $setupFile) {
            Rename-Item $setupFile "PriceBell-${{ env.VERSION }}-windows-x64-setup.exe"
          }

      - name: Sign Windows executable
        if: env.WINDOWS_CERT_BASE64 != ''
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          [IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
            /f cert.pfx /p $env:WINDOWS_CERT_PASSWORD /tr http://timestamp.digicert.com `
            /td sha256 /fd sha256 build\PriceBell.exe
          Remove-Item cert.pfx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          if-no-files-found: ignore
          path: |
            PriceBell-${{ env.VERSION }}-windows-${{ matrix.arch }}.zip
            PriceBell-${{ env.VERSION }}-windows-x64-setup.exe

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [linux-appimage, windows]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${{ env.VERSION }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" HEAD > /tmp/changelog.txt
          else
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${{ env.VERSION }}" > /tmp/changelog.txt
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: PriceBell ${{ env.VERSION }}
          body_path: /tmp/changelog.txt
          files: artifacts/*
          fail_on_unmatched_files: false
